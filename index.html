---
layout: null
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1><a class="brand-link" href="https://diff.im" target="_blank" rel="noopener noreferrer">{{ site.title }}</a></h1>
        <nav class="header-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}" aria-current="page">Home</a>
          <a href="{{ '/archive/' | relative_url }}">Archive</a>
        </nav>
      </header>

      <p id="tag-summary" class="tag-summary" hidden></p>
      <section id="timeline" class="timeline" aria-live="polite"></section>
      <nav id="pagination" class="pagination" aria-label="Pagination" hidden>
        <button id="prev-page" type="button">Previous</button>
        <span id="page-indicator">Page 1 / 1</span>
        <button id="next-page" type="button">Next</button>
      </nav>
    </main>

    <script>
      window.BLOG_POSTS = {{ site.data.posts | jsonify }};
      window.BLOG_POST_DETAIL_PATH = "{{ '/post/' | relative_url }}";
      window.BLOG_HOME_PATH = "{{ '/' | relative_url }}";
    </script>
    <script type="module" src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
