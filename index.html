---
layout: null
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>{{ site.title }}</h1>
      </header>

      <section id="timeline" class="timeline" aria-live="polite"></section>
    </main>

    <script>
      window.BLOG_POSTS = {{ site.data.posts | jsonify }};
    </script>
    <script type="module" src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
