---
layout: null
permalink: /post/
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site.title }} Post</title>
    <meta name="description" content="Post detail" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <main class="container post-page-container">
      <p class="back-row"><a id="back-link" class="back-link back-link-prominent" href="{{ '/' | relative_url }}">Back</a></p>
      <section id="post-detail" aria-live="polite"></section>
    </main>

    <script>
      window.BLOG_POSTS = {{ site.data.posts | jsonify }};
      window.BLOG_HOME_PATH = "{{ '/' | relative_url }}";
    </script>
    <script type="module" src="{{ '/assets/js/post.js' | relative_url }}"></script>
  </body>
</html>
