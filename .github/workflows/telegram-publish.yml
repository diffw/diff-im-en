name: Telegram Auto Publish

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: telegram-auto-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Telegram updates into posts.json
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_ID: ${{ secrets.TELEGRAM_ALLOWED_CHAT_ID }}
        run: node scripts/telegram-to-posts.mjs

      - name: Detect content changes
        id: detect_changes
        run: |
          if [ -z "$(git status --porcelain _data/posts.json .bot-state/telegram-offset.json)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git add _data/posts.json .bot-state/telegram-offset.json
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Auto publish posts from Telegram"
          git push origin HEAD:main

      - name: Setup Pages
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        if: steps.detect_changes.outputs.has_changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        if: steps.detect_changes.outputs.has_changes == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
